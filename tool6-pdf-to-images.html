    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">

    <title>PDF to Images Converter - Extract Pages as PNG/JPEG/WebP</title>
    <meta name="description" content="Free online tool to convert PDF to images. Extract all pages as PNG, JPEG, or WebP and download as ZIP. No uploads, runs locally in your browser.">
    <link rel="canonical" href="https://easymedia.example.com/tool6-pdf-to-images.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
        body { background:#f0f4fa; min-height:100vh; display:flex; flex-direction:column; }
        .wrapper { max-width:1100px; width:100%; margin:0 auto; padding:20px 24px; flex:1; display:flex; flex-direction:column; }
        .navbar { background:#ffffffdd; backdrop-filter:blur(8px); border-radius:60px; padding:14px 30px; margin-bottom:28px; box-shadow:0 10px 30px rgba(0,20,50,0.08); display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; border:1px solid rgba(255,255,255,0.6); }
        .brand { display:flex; align-items:center; gap:10px; font-size:1.7rem; font-weight:700; color:#0b1f3b; text-decoration:none; }
        .brand i { background:#1a5cff; color:white; padding:8px 10px; border-radius:40px; font-size:1.2rem; }
        .brand small { font-weight:400; font-size:0.9rem; color:#3a5f8a; }
        .badge { font-size:0.85rem; color:#4d6b85; }
        .badge i { color:#1a5cff; }
        .back-link { display:inline-flex; align-items:center; gap:8px; background:#eaf1fc; padding:8px 20px; border-radius:40px; text-decoration:none; color:#1a2f4a; font-weight:600; font-size:0.9rem; margin-bottom:20px; width:fit-content; transition:0.2s; }
        .back-link:hover { background:#dce6f5; }
        .back-link i { color:#1a5cff; }
        .page-header { margin-bottom:20px; }
        .page-header h1 { font-size:1.8rem; color:#0b1f3b; display:flex; align-items:center; gap:12px; }
        .page-header h1 i { color:#1a5cff; background:#e5efff; padding:12px; border-radius:20px; }
        .page-header p { color:#4d6b85; margin-top:4px; font-size:1rem; }
        .tool-card { background:#ffffff; border-radius:32px; padding:24px 28px 28px; box-shadow:0 12px 35px rgba(0,0,0,0.04); border:1px solid #e9effa; max-width:900px; }
        .tool-body { background:#f7faff; border-radius:24px; padding:18px 20px; }
        .drop-zone { border:2px dashed #b0c8e5; border-radius:20px; padding:24px; text-align:center; background:#fafcff; cursor:pointer; transition:0.25s; }
        .drop-zone:hover { border-color:#1a5cff; background:#f0f6ff; }
        .drop-zone svg { display:block; margin:0 auto 4px; }
        .drop-zone p { color:#1f3d6b; margin:4px 0; }
        .drop-zone .highlight { color:#1a5cff; font-weight:600; text-decoration:underline; cursor:pointer; }
        .file-list { background:#edf3fc; border-radius:16px; padding:10px 16px; margin:12px 0; min-height:44px; color:#1a3155; font-size:0.9rem; word-break:break-word; }
        .btn { background:white; border:none; padding:10px 24px; border-radius:60px; font-weight:600; font-size:0.9rem; color:#1a2f4a; box-shadow:0 4px 10px rgba(0,20,30,0.08); display:inline-flex; align-items:center; gap:8px; transition:0.2s; cursor:pointer; border:1px solid #c6dbe8; }
        .btn-primary { background:#1a5cff; border-color:#1a5cff; color:white; box-shadow:0 8px 16px -6px #1a5cff80; }
        .btn-primary i { color:white; }
        .btn-primary:hover { background:#0047dd; transform:scale(1.01); }
        .btn-success { background:#0f9d5e; border-color:#0f9d5e; color:white; }
        .btn-success:hover { background:#0a7a48; transform:scale(1.01); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; box-shadow:none !important; }
        .btn-outline { background:transparent; }
        .btn-outline:hover { background:#eaf1f7; }
        .btn-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
        .status-box { background:#edf3fc; border-radius:16px; padding:12px 16px; margin-top:12px; min-height:46px; color:#1a3155; font-size:0.9rem; }
        .progress-container { margin:10px 0 6px; background:#d7e2ec; border-radius:40px; height:6px; overflow:hidden; display:none; }
        .progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#1a5cff,#5ba3c9); border-radius:40px; transition:width 0.3s; }
        .settings-row { background:#eaf1fc; border-radius:16px; padding:10px 16px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin:10px 0; }
        .settings-row label { display:flex; align-items:center; gap:6px; font-size:0.85rem; color:#1a2f4a; }
        .settings-row input[type="range"] { width:90px; accent-color:#1a5cff; }
        .settings-row select { border-radius:30px; border:1px solid #b9ceec; padding:4px 12px; background:white; font-size:0.8rem; }
        .settings-row .val { background:white; padding:0 10px; border-radius:20px; border:1px solid #b9ceec; font-weight:600; color:#1a5cff; min-width:32px; text-align:center; font-size:0.8rem; }
        .site-footer { margin-top:48px; padding:24px 0 16px; border-top:1px solid #d8e3f5; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; }
        .site-footer .copyright { color:#6f8bb0; font-size:0.85rem; }
        .site-footer .footer-links { display:flex; gap:20px; }
        .site-footer .footer-links a { color:#4d6b85; text-decoration:none; font-size:0.85rem; transition:0.2s; }
        .site-footer .footer-links a:hover { color:#1a5cff; }
        .site-footer .footer-badge { display:flex; align-items:center; gap:6px; color:#6f8bb0; font-size:0.8rem; }
        .site-footer .footer-badge i { color:#1a5cff; }
        .spinner { display:inline-block; width:18px; height:18px; border:3px solid #dce6f5; border-top:3px solid #1a5cff; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media (max-width:700px){ .navbar{flex-direction:column;gap:8px;padding:14px 20px;} .tool-card{padding:16px;} .tool-body{padding:12px;} .settings-row{flex-direction:column;align-items:stretch;} .site-footer{flex-direction:column;gap:12px;text-align:center;} }
    </style>
</head>
<body>
<div class="wrapper">
    <header class="navbar">
        <a href="index.html" class="brand"><i class="fas fa-wave-square"></i> EasyMedia <small>· free tools</small></a>
        <div class="badge"><i class="fas fa-shield-alt"></i> 100% offline · no uploads</div>
    </header>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Tools</a>

    <div class="page-header">
        <h1><i class="fas fa-images"></i> PDF to Images</h1>
        <p>Extract all pages from a PDF as PNG, JPEG, or WebP images + ZIP download</p>
    </div>

    <div class="tool-card">
        <div class="tool-body">
            <div class="drop-zone" id="dropZone6">
                <svg viewBox="0 0 24 24" width="40" height="40" stroke="#1a5cff" stroke-width="1.5" fill="none">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                <p>Drop PDF or <span class="highlight" id="browse6">browse</span></p>
                <input type="file" id="fileInput6" accept=".pdf" style="display:none;">
                <div style="font-size:0.7rem; color:#6f8bb0;">.pdf files only</div>
            </div>
            <div class="file-list" id="fileList6">📎 No PDF selected</div>
            <div class="settings-row">
                <label>Scale <input type="range" id="scaleSlider6" min="0.5" max="3" step="0.1" value="1.5"> <span class="val" id="scaleVal6">1.5x</span></label>
                <label>Format <select id="imageFormat6">
                    <option value="png">PNG</option>
                    <option value="jpeg">JPEG</option>
                    <option value="webp">WebP</option>
                </select></label>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="convertBtn6" disabled><i class="fas fa-file-pdf"></i> Convert + ZIP</button>
                <button class="btn btn-outline" id="clearBtn6"><i class="fas fa-trash-alt"></i> Clear</button>
            </div>
            <div class="progress-container" id="progressContainer6">
                <div class="progress-bar" id="progressBar6"></div>
            </div>
            <div class="status-box" id="status6">⏳ Waiting for PDF...</div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="copyright"><i class="fas fa-copyright"></i> 2026 EasyMedia</div>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms</a>
            <a href="#">Contact</a>
        </div>
        <div class="footer-badge"><i class="fas fa-shield-alt"></i> 100% offline</div>
    </footer>
</div>

<script>
    (function() {
        const dropZone = document.getElementById('dropZone6');
        const fileInput = document.getElementById('fileInput6');
        const fileList = document.getElementById('fileList6');
        const convertBtn = document.getElementById('convertBtn6');
        const clearBtn = document.getElementById('clearBtn6');
        const status = document.getElementById('status6');
        const progressContainer = document.getElementById('progressContainer6');
        const progressBar = document.getElementById('progressBar6');
        const scaleSlider = document.getElementById('scaleSlider6');
        const scaleVal = document.getElementById('scaleVal6');
        const imageFormat = document.getElementById('imageFormat6');

        let currentFile = null;

        scaleSlider.addEventListener('input', () => { scaleVal.textContent = scaleSlider.value + 'x'; });

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function updateUI() {
            if (currentFile) {
                fileList.innerHTML = `
                    <span style="background:#dce6f5; padding:4px 14px; border-radius:40px; display:inline-block;">
                        📄 ${currentFile.name} (${formatSize(currentFile.size)})
                        <button data-remove style="background:transparent; border:none; color:#b91c1c; font-weight:bold; cursor:pointer;">×</button>
                    </span>
                `;
                fileList.querySelector('[data-remove]')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearFile();
                });
                convertBtn.disabled = false;
                status.innerHTML = `✅ ${currentFile.name} ready.`;
            } else {
                fileList.innerHTML = '📎 No PDF selected';
                convertBtn.disabled = true;
                status.innerHTML = '⏳ Waiting for PDF...';
            }
        }

        function clearFile() {
            currentFile = null;
            fileInput.value = '';
            progressContainer.style.display = 'none';
            progressBar.style.width = '0%';
            updateUI();
        }

        function handleFile(file) {
            if (!file || file.type !== 'application/pdf') {
                status.innerHTML = '❌ Please select a valid PDF.';
                return;
            }
            currentFile = file;
            updateUI();
        }

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#1a5cff';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#b0c8e5';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#b0c8e5';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        dropZone.addEventListener('click', () => fileInput.click());
        document.getElementById('browse6').addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
            fileInput.value = '';
        });
        clearBtn.addEventListener('click', clearFile);

        convertBtn.addEventListener('click', async function() {
            if (!currentFile) return;
            convertBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '5%';
            status.innerHTML = '<span class="spinner"></span> Processing PDF...';

            try {
                const scale = parseFloat(scaleSlider.value) || 1.5;
                const format = imageFormat.value || 'png';
                const mimeType = format === 'png' ? 'image/png' : 
                                format === 'jpeg' ? 'image/jpeg' : 'image/webp';
                const ext = format === 'jpeg' ? 'jpg' : format;

                const arrayBuffer = await currentFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;

                progressBar.style.width = '15%';
                status.innerHTML = `<span class="spinner"></span> Processing ${totalPages} pages...`;

                const zip = new JSZip();

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: scale });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;

                    const imageBlob = await new Promise(resolve => {
                        canvas.toBlob(resolve, mimeType, format === 'jpeg' ? 0.92 : undefined);
                    });

                    const fileName = `page_${pageNum}.${ext}`;
                    zip.file(fileName, imageBlob);

                    const pct = 15 + (pageNum / totalPages) * 75;
                    progressBar.style.width = Math.min(pct, 90) + '%';
                    status.innerHTML = `<span class="spinner"></span> Page ${pageNum}/${totalPages}...`;
                }

                progressBar.style.width = '95%';
                status.innerHTML = '<span class="spinner"></span> Creating ZIP archive...';

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const zipName = currentFile.name.replace(/\.pdf$/i, '') + '_images.zip';

                progressBar.style.width = '100%';
                saveAs(zipBlob, zipName);

                status.innerHTML = `✅ Done! ${totalPages} pages · downloaded ${zipName}`;
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.style.width = '0%';
                }, 1000);

            } catch (error) {
                console.error(error);
                status.innerHTML = '❌ Error: ' + (error.message || 'Unknown error');
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';
            }
            convertBtn.disabled = false;
        });

        updateUI();
    })();
</script>
</body>
</html>
